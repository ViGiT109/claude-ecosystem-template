repos:
  - repo: local
    hooks:
      # Python lint — enable if language = python in .ecosystem.toml
      - id: ruff-check
        name: Ruff lint check
        entry: uv run ruff check --config pyproject.toml
        language: system
        types: [python]
        # Remove this hook if not using Python/ruff

      # Always-on: blocks commit when task.md has unchecked [ ] or in-progress [/] items
      - id: task-guardrail
        name: task.md abandoned tasks check
        entry: python scripts/check_task_guardrail.py
        language: system
        always_run: true
        pass_filenames: false

      # Blocks commit when plugin.json drifts from the actual contents of
      # .claude/. Run `python scripts/regenerate_plugin_manifest.py` to fix.
      - id: plugin-manifest-sync
        name: plugin.json ↔ .claude/ sync check
        entry: python scripts/regenerate_plugin_manifest.py --check
        language: system
        files: ^(\.claude/(hooks|commands|agents|skills)/.*|\.claude-plugin/plugin\.json|scripts/regenerate_plugin_manifest\.py)$
        pass_filenames: false

      # Always-on: blocks commit when CLAUDE.md has drifted from AGENTS.md.
      # AGENTS.md is the source of truth (cross-tool standard); CLAUDE.md is
      # generated by scripts/sync_agents_md.py. If you edited either source
      # without re-running the script, this hook fails — run the script and
      # re-stage CLAUDE.md.
      - id: agents-md-sync
        name: AGENTS.md ↔ CLAUDE.md sync check
        entry: python scripts/sync_agents_md.py --check
        language: system
        files: ^(AGENTS\.md|\.agents/claude-overrides\.md|CLAUDE\.md|scripts/sync_agents_md\.py)$
        pass_filenames: false

      # Python + uv only: verifies uv.lock is in sync with pyproject.toml
      - id: deps-sync
        name: Check uv.lock ↔ pyproject.toml sync
        entry: uv lock --locked
        language: system
        files: ^(uv\.lock|pyproject\.toml)$
        pass_filenames: false
        # Remove this hook if not using uv
